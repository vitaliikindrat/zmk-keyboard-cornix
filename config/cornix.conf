# Radio/link tuning for laggy + sticky-key behavior.
#
# This board runs BLE off the internal RC oscillator (no 32k crystal), which
# makes the link sensitive to weak signal and bad connection intervals.
# The stock defconfig sets TX_PWR_PLUS_8 on the LEFT half only — this file is
# merged for both halves, bringing the right (peripheral) up to full power too.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Request tighter, more reliable BLE connection parameters from the host.
# Notably fixes multi-second latency / stuck-key repeats with Linux (BlueZ).
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Workaround for zmkfirmware/zmk#3156: when the central boots (e.g. cable
# moved to another host with the battery switch off), subscribing to the
# peripheral's battery level races with GATT discovery of the key-position
# characteristic. Discovery aborts early and the right half stays connected
# but dead until it is power-cycled. Disabling battery fetching removes the
# race; the trade-off is the host no longer sees the right half's battery %.
# (No-op on the right/peripheral build.)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n
